<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#FEDC00">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="숨톡">
<title>숨톡</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html{height:100%;height:-webkit-fill-available}
body{
  font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
  background:#0f0f1a;color:#e8e8f0;
  height:100vh;height:-webkit-fill-available;
  overflow:hidden;display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;
}
#app{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}
.page{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0f0f1a}
#tabbar{height:62px;background:#16162a;border-top:1px solid #ffffff0f;display:flex;align-items:stretch;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;position:relative;padding-bottom:2px}
.tab-item span.icon{font-size:22px;line-height:1}
.tab-item span.lbl{font-size:10px;font-weight:600;color:#7878a0}
.tab-item.active span.lbl{color:#FEDC00}
.badge{position:absolute;top:6px;right:calc(50% - 20px);background:#ef4444;color:#fff;border-radius:10px;min-width:16px;height:16px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;padding:0 3px}
.topbar{height:56px;background:#16162a;display:flex;align-items:center;padding:0 16px;gap:10px;border-bottom:1px solid #ffffff0a;flex-shrink:0;padding-top:env(safe-area-inset-top)}
.back-btn{background:transparent;border:none;color:#7878a0;font-size:22px;padding:6px 10px 6px 4px;margin-left:-4px;line-height:1;cursor:pointer}
.title{font-size:17px;font-weight:700;flex:1}
.row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .15s}
.row:active{background:#ffffff08}
.card{background:#1e1e35;border-radius:14px;margin:0 16px 8px;padding:14px 16px}
input[type=text],input[type=password],input[type=search],textarea{
  font-family:inherit;background:#1e1e35;border:1.5px solid #ffffff1a;
  border-radius:12px;padding:12px 14px;font-size:15px;color:#e8e8f0;
  outline:none;width:100%;caret-color:#FEDC00;
  -webkit-text-fill-color:#e8e8f0;appearance:none;-webkit-appearance:none;
}
input::placeholder{color:#7878a0;-webkit-text-fill-color:#7878a0}
input:focus{border-color:#FEDC0055}
.btn-primary{background:#FEDC00;border:none;border-radius:13px;padding:14px;color:#000;font-weight:800;font-size:15px;width:100%;font-family:inherit;cursor:pointer;transition:opacity .15s}
.btn-primary:active{opacity:.85}
.btn-danger{background:#ef444420;border:1px solid #ef444440;border-radius:12px;padding:13px;color:#ef4444;font-weight:700;font-size:14px;width:100%;font-family:inherit;cursor:pointer}
.btn-ghost{background:transparent;border:none;color:#7878a0;font-size:13px;width:100%;font-family:inherit;cursor:pointer;padding:10px}
.sw{width:46px;height:26px;border-radius:13px;border:none;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.sw::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;transition:left .2s;box-shadow:0 1px 3px #00000040}
.sw.on{background:#FEDC00}.sw.on::after{left:23px}
.sw.off{background:#3a3a5c}.sw.off::after{left:3px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#1e1e35;border-radius:12px;margin:0 16px 7px;cursor:pointer;transition:background .15s}
.set-row:active{background:#252540}
.avt-wrap{position:relative;display:inline-block;flex-shrink:0}
.bubble-me{background:#FEDC00;color:#111;border-radius:18px 18px 4px 18px}
.bubble-them{background:#1e1e35;color:#e8e8f0;border-radius:18px 18px 18px 4px}
#chatInputBar{padding:8px 12px;padding-bottom:calc(8px + env(safe-area-inset-bottom));background:#16162a;border-top:1px solid #ffffff0a;display:flex;gap:8px;align-items:center;flex-shrink:0}
#chatInputWrap{flex:1;background:#1e1e35;border-radius:24px;padding:8px 14px;display:flex;align-items:center;gap:8px;border:1px solid #ffffff12}
#sendBtn{width:42px;height:42px;border-radius:13px;background:#1e1e35;border:none;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;cursor:pointer;transition:background .15s}
.overlay{position:fixed;inset:0;background:#000000aa;z-index:500;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#1e1e35;border-radius:22px 22px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:88vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}
.sheet-handle{width:38px;height:4px;background:#ffffff25;border-radius:2px;margin:0 auto 18px}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
::-webkit-scrollbar{width:0}
.fade{animation:fi .18s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sec-lbl{font-size:12px;color:#7878a0;font-weight:600;padding:14px 20px 6px;letter-spacing:.5px}
.divider{height:1px;background:#ffffff08;margin:4px 16px}
/* Loading spinner */
.spinner{width:36px;height:36px;border:3px solid #ffffff15;border-top-color:#FEDC00;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════ FIREBASE ═══════════════
const FB='https://sumtok-7d603-default-rtdb.firebaseio.com';

async function fbGet(path){
  try{const r=await fetch(`${FB}/${path}.json`);if(!r.ok)return null;return await r.json()}catch{return null}
}
async function fbSet(path,data){
  try{await fetch(`${FB}/${path}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})}catch{}
}
async function fbPatch(path,data){
  try{await fetch(`${FB}/${path}.json`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})}catch{}
}
async function fbPush(path,data){
  try{const r=await fetch(`${FB}/${path}.json`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});return await r.json()}catch{return null}
}
async function fbDel(path){
  try{await fetch(`${FB}/${path}.json`,{method:'DELETE'})}catch{}
}

// ═══════════════ LOCAL (session + settings + photos only) ═══════════════
const lSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const lGet=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}};

// ═══════════════ UTILS ═══════════════
const PAL=['#FF6B9D','#4ECDC4','#A78BFA','#F59E0B','#34D399','#F97316','#60A5FA','#EC4899','#e879f9','#22d3ee','#fb923c','#a3e635'];
const rc=()=>PAL[Math.floor(Math.random()*PAL.length)];
const ini=n=>(n||'?').slice(0,2);
const ts=()=>{const d=new Date(),h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0');return`${h>=12?'오후':'오전'} ${h>12?h-12:h||12}:${m}`};
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const chatKey=(a,b)=>[a,b].sort().join('_');

// ═══════════════ STATE ═══════════════
let S={
  page:'loading',
  me:null, tab:'friends',
  friends:[],prevs:[],
  activeChat:null, // {userId,name,color,photo,msgs[]}
  lId:'',lPw:'',lErr:'',showPw:false,
  sId:'',sPw:'',sPw2:'',sName:'',sErr:'',sOk:false,
  showProf:false,pName:'',pStatus:'',
  showAdd:false,addId:'',addRes:null,foundU:null,
  editStatus:false,tmpStatus:'',
  setPage:null,
  friendProfId:null,
  showChatOpt:false,
  chatSearch:'',
};
let _txt='';
let pollTimer=null;
let msgStream=null;
const app=document.getElementById('app');
function R(){app.innerHTML='';render()}

// ═══════════════ SEED ═══════════════
async function initDB(){
  const existing=await fbGet('users/jowonchae');
  if(existing)return; // already seeded
  const users={
    jowonchae:{pw:'1234',      name:'조원채',status:'개발자입니다 👨‍💻',      color:'#FEDC00'},
    jisukim:  {pw:'jisu1234',  name:'김지수',status:'오늘도 화이팅! 🔥',     color:'#FF6B9D'},
    minjun99: {pw:'mj9999',    name:'박민준',status:'점심 뭐먹지...',         color:'#4ECDC4'},
    seoyeon_: {pw:'sy0000',    name:'이서연',status:'스터디 중 📚',          color:'#A78BFA'},
    hyunwoo22:{pw:'hw2222',    name:'최현우',status:'운동하러 갑니다 💪',     color:'#F59E0B'},
    daeun05:  {pw:'de0505',    name:'정다은',status:'🎵 Listening to music', color:'#34D399'},
    taeyangk: {pw:'ty1004',    name:'강태양',status:'주말에 여행가자!',        color:'#F97316'},
    haneul7:  {pw:'hl7777',    name:'윤하늘',status:'바쁜 하루 💼',          color:'#60A5FA'},
    chaewon_lim:{pw:'cw1234',  name:'임채원',status:'배고파 🍜',            color:'#EC4899'},
  };
  await fbSet('users',users);
  // seed friends
  await fbSet('friends/jowonchae',{jisukim:true,minjun99:true,seoyeon_:true});
  await fbSet('friends/jisukim',{jowonchae:true});
  await fbSet('friends/minjun99',{jowonchae:true});
  await fbSet('friends/seoyeon_',{jowonchae:true});
  // seed messages
  const now='오후 6:32';
  await fbSet(`messages/${chatKey('jowonchae','jisukim')}`,{
    m1:{from:'jisukim',text:'야 오늘 뭐해?',time:'오후 5:10',read:true,ts:1},
    m2:{from:'jowonchae',text:'그냥 집에 있어~',time:'오후 5:11',read:true,ts:2},
    m3:{from:'jisukim',text:'오늘 저녁 같이 먹을래? 😊',time:'오후 6:32',read:false,ts:3},
  });
  await fbSet(`messages/${chatKey('jowonchae','minjun99')}`,{
    m1:{from:'jowonchae',text:'야 나 오늘 면접 붙었어!!',time:'오후 3:10',read:true,ts:1},
    m2:{from:'minjun99',text:'ㅋㅋㅋ 진짜?? 대박이다',time:'오후 3:15',read:false,ts:2},
  });
  await fbSet(`messages/${chatKey('jowonchae','seoyeon_')}`,{
    m1:{from:'seoyeon_',text:'내일 스터디 몇시야?',time:'오전 11:45',read:false,ts:1},
  });
  // seed unread
  await fbSet('unread/jowonchae',{jisukim:1,minjun99:1,seoyeon_:1});
}

// ═══════════════ HELPERS ═══════════════
function msgObjToArr(obj){
  if(!obj)return[];
  return Object.values(obj).sort((a,b)=>(a.ts||0)-(b.ts||0));
}

async function loadFriends(myId){
  const fr=await fbGet(`friends/${myId}`);
  if(!fr)return[];
  const ids=Object.keys(fr);
  const arr=[];
  for(const id of ids){
    const u=await fbGet(`users/${id}`);
    if(!u)continue;
    const ov=await fbGet(`profiles/${id}`)||{};
    const photo=lGet(`photo_${id}`);
    arr.push({...u,...ov,id,photo,online:Math.random()>.45});
  }
  return arr;
}

async function loadPrevs(myId,friends){
  const unreadData=await fbGet(`unread/${myId}`)||{};
  const arr=[];
  for(const f of friends){
    const msgs=await fbGet(`messages/${chatKey(myId,f.id)}`);
    if(!msgs)continue;
    const list=msgObjToArr(msgs);
    if(!list.length)continue;
    const last=list[list.length-1];
    const cs=await fbGet(`chatmeta/${myId}/${f.id}`)||{};
    arr.push({userId:f.id,name:f.name,color:f.color,photo:f.photo||null,lastMsg:last.text,time:last.time,unread:unreadData[f.id]||0,muted:cs.muted||false});
  }
  return arr;
}

function gSet(id){return{msgAlert:true,sound:true,darkMode:true,fontSize:15,lastSeen:true,readReceipt:true,profilePhoto:'all',lang:'한국어',...(lGet(`set_${id}`)||{})}}
function sSet(id,patch){lSet(`set_${id}`,{...gSet(id),...patch})}

// ═══════════════ AVATAR ═══════════════
function avt(name,color,size,online,photo){
  const r=Math.round(size*.3);
  const dot=online!=null?`<div style="position:absolute;bottom:1px;right:1px;width:${Math.round(size*.27)}px;height:${Math.round(size*.27)}px;border-radius:50%;background:${online?'#22c55e':'#94a3b8'};border:2px solid #16162a"></div>`:'';
  const inner=photo?`<img src="${photo}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:`<span style="font-size:${Math.round(size*.36)}px;font-weight:700;color:#fff">${ini(name)}</span>`;
  return`<div class="avt-wrap"><div style="width:${size}px;height:${size}px;border-radius:${r}px;background:${photo?'#2a2a4a':`linear-gradient(135deg,${color}dd,${color}88)`};display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">${inner}</div>${dot}</div>`;
}

// ═══════════════ RENDER ═══════════════
function render(){
  if(S.page==='loading')   return renderLoading();
  if(S.page==='login')     return renderLogin();
  if(S.page==='signup')    return renderSignup();
  if(S.page==='main')      return renderMain();
  if(S.page==='chat')      return renderChat();
  if(S.page==='friendprof') return renderFriendProf();
  if(S.page==='setpage')   return renderSetPage();
}

// ═══════════════ LOADING ═══════════════
function renderLoading(){
  app.innerHTML=`<div class="page" style="align-items:center;justify-content:center;gap:20px">
    <div style="width:72px;height:72px;border-radius:22px;background:#FEDC00;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 8px 28px #FEDC0060">💬</div>
    <div style="font-size:22px;font-weight:800">숨톡</div>
    <div class="spinner"></div>
    <div style="font-size:13px;color:#7878a0" id="loadMsg">서버에 연결 중...</div>
  </div>`;
}
function setLoadMsg(t){const el=document.getElementById('loadMsg');if(el)el.textContent=t}

// ═══════════════ LOGIN ═══════════════
function renderLogin(){
  app.innerHTML=`<div class="fade page" style="justify-content:center;overflow-y:auto;padding:28px 24px">
    <div style="text-align:center;margin-bottom:36px">
      <div style="width:72px;height:72px;border-radius:22px;background:#FEDC00;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 14px;box-shadow:0 8px 28px #FEDC0060">💬</div>
      <div style="font-size:26px;font-weight:800">숨톡</div>
      <div style="font-size:14px;color:#7878a0;margin-top:5px">로그인하고 친구와 대화해요</div>
    </div>
    <div style="margin-bottom:13px">
      <div style="font-size:12px;color:#7878a0;font-weight:600;margin-bottom:6px;padding-left:2px">아이디</div>
      <input id="li" type="text" autocomplete="username" placeholder="아이디 입력" style="border-color:${S.lErr?'#ef4444':'#ffffff1a'}">
    </div>
    <div style="margin-bottom:18px">
      <div style="font-size:12px;color:#7878a0;font-weight:600;margin-bottom:6px;padding-left:2px">비밀번호</div>
      <div style="position:relative">
        <input id="lp" type="${S.showPw?'text':'password'}" autocomplete="current-password" placeholder="비밀번호 입력" style="border-color:${S.lErr?'#ef4444':'#ffffff1a'};padding-right:48px">
        <button id="tpw" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:transparent;border:none;font-size:18px;padding:4px;color:#7878a0">${S.showPw?'🙈':'👁️'}</button>
      </div>
    </div>
    ${S.lErr?`<div style="background:#ef444420;border:1px solid #ef444440;border-radius:11px;padding:10px 14px;font-size:13px;color:#ef4444;margin-bottom:14px;text-align:center">${esc(S.lErr)}</div>`:''}
    <button id="doLogin" class="btn-primary" style="margin-bottom:16px">로그인</button>
    <div style="text-align:center;font-size:14px;color:#7878a0">계정이 없으신가요? <span id="goSu" style="color:#FEDC00;font-weight:700;cursor:pointer">회원가입</span></div>
  </div>`;
  const li=document.getElementById('li'),lp=document.getElementById('lp');
  li.value=S.lId; lp.value=S.lPw;
  li.oninput=ev=>S.lId=ev.target.value;
  lp.oninput=ev=>S.lPw=ev.target.value;
  li.onkeydown=lp.onkeydown=ev=>{if(ev.key==='Enter')doLogin()};
  document.getElementById('tpw').onclick=()=>{S.showPw=!S.showPw;R()};
  document.getElementById('doLogin').onclick=doLogin;
  document.getElementById('goSu').onclick=()=>{S.page='signup';R()};
}

async function doLogin(){
  S.lErr='';
  const btn=document.getElementById('doLogin');
  if(btn){btn.disabled=true;btn.textContent='확인 중...'}
  const u=await fbGet(`users/${S.lId.trim()}`);
  if(!u){S.lErr='존재하지 않는 아이디입니다';R();return}
  if(u.pw!==S.lPw){S.lErr='비밀번호가 올바르지 않습니다';R();return}
  const ov=await fbGet(`profiles/${S.lId.trim()}`)||{};
  const photo=lGet(`photo_${S.lId.trim()}`);
  S.me={...u,...ov,id:S.lId.trim(),photo};
  lSet('session',{id:S.lId.trim()});
  // load data
  S.page='loading'; R(); setLoadMsg('데이터 불러오는 중...');
  S.friends=await loadFriends(S.me.id);
  S.prevs=await loadPrevs(S.me.id,S.friends);
  S.tab='friends'; S.page='main'; S.lId=''; S.lPw=''; S.lErr='';
  _txt=''; startPoll(); R();
}

// ═══════════════ SIGNUP ═══════════════
function renderSignup(){
  app.innerHTML=`<div class="fade page" style="overflow-y:auto">
    <div class="topbar"><button id="back" class="back-btn">←</button><div class="title">회원가입</div></div>
    <div style="padding:24px">
    ${S.sOk?`<div style="text-align:center;padding:50px 0"><div style="font-size:56px;margin-bottom:14px">🎉</div><div style="font-size:18px;font-weight:700">가입 완료!</div><div style="font-size:14px;color:#7878a0;margin-top:6px">로그인 화면으로 이동합니다...</div></div>`:`
    ${[['아이디','sId','text','영문+숫자 4자 이상'],['닉네임','sName','text','표시될 이름'],['비밀번호','sPw','password','4자 이상'],['비밀번호 확인','sPw2','password','비밀번호 재입력']].map(([lb,id,tp,ph])=>`
    <div style="margin-bottom:14px">
      <div style="font-size:12px;color:#7878a0;font-weight:600;margin-bottom:6px;padding-left:2px">${lb}</div>
      <input id="${id}" type="${tp}" placeholder="${ph}">
    </div>`).join('')}
    ${S.sErr?`<div style="background:#ef444420;border:1px solid #ef444440;border-radius:11px;padding:10px 14px;font-size:13px;color:#ef4444;margin-bottom:14px;text-align:center">${esc(S.sErr)}</div>`:''}
    <button id="doSu" class="btn-primary">계정 만들기</button>`}
    </div></div>`;
  document.getElementById('back').onclick=()=>{S.page='login';R()};
  if(!S.sOk){
    ['sId','sName','sPw','sPw2'].forEach(id=>{
      const el=document.getElementById(id);if(!el)return;
      el.value=S[id]||'';el.oninput=ev=>S[id]=ev.target.value;
      el.onkeydown=ev=>{if(ev.key==='Enter')doSignup()};
    });
    document.getElementById('doSu').onclick=doSignup;
  }
}

async function doSignup(){
  S.sErr='';
  const btn=document.getElementById('doSu');
  if(btn){btn.disabled=true;btn.textContent='확인 중...'}
  if(!S.sId.trim()){S.sErr='아이디를 입력해주세요';R();return}
  if(S.sId.length<4){S.sErr='아이디는 4자 이상이어야 합니다';R();return}
  if(/\s/.test(S.sId)){S.sErr='공백은 사용할 수 없어요';R();return}
  if(!S.sName.trim()){S.sErr='닉네임을 입력해주세요';R();return}

  const existing=await fbGet(`users/${S.sId.trim()}`);
  if(existing){S.sErr='이미 사용 중인 아이디입니다';R();return}
  await fbSet(`users/${S.sId.trim()}`,{pw:S.sPw,name:S.sName.trim(),status:'안녕하세요! 반가워요 👋',color:rc()});

  setTimeout(()=>{S.sOk=false;S.sId='';S.sPw='';S.sPw2='';S.sName='';S.sErr='';S.page='login';R()},1800);
}

// Real-time Firebase SSE stream
function startMsgStream(){
  stopMsgStream();
  if(!S.activeChat)return;
  const key=chatKey(S.me.id,S.activeChat.userId);
  const url=`${FB}/messages/${key}.json`;
  try{
    msgStream=new EventSource(url);
    msgStream.addEventListener('put',ev=>{
      try{
        const d=JSON.parse(ev.data);
        if(!d.data)return;
        const fresh=msgObjToArr(d.data);
        if(fresh.length!==S.activeChat.msgs.length){
          // Mark received messages as read
          const myId=S.me.id;
          const toRead={};
          Object.entries(d.data).forEach(([k,v])=>{if(v.from!==myId&&!v.read)toRead[k]={...v,read:true}});
          if(Object.keys(toRead).length)fbPatch(`messages/${key}`,toRead);
          S.activeChat.msgs=fresh;
          patchMsgList(fresh);
          // clear my unread
          fbSet(`unread/${myId}/${S.activeChat.userId}`,0);
        }
      }catch{}
    });
    msgStream.addEventListener('patch',ev=>{
      // New message pushed — re-fetch
      fbGet(`messages/${key}`).then(data=>{
        if(!data)return;
        const fresh=msgObjToArr(data);
        if(fresh.length!==S.activeChat.msgs.length){
          S.activeChat.msgs=fresh;
          patchMsgList(fresh);
          fbSet(`unread/${S.me.id}/${S.activeChat.userId}`,0);
        }
      });
    });
  }catch{
    // Fallback to polling
    pollTimer=setInterval(pollChat,2000);
  }
}

function stopMsgStream(){
  if(msgStream){try{msgStream.close()}catch{} msgStream=null}
}

async function pollChat(){
  if(!S.activeChat||S.page!=='chat')return;
  const key=chatKey(S.me.id,S.activeChat.userId);
  const data=await fbGet(`messages/${key}`);
  if(!data)return;
  const fresh=msgObjToArr(data);
  if(fresh.length!==S.activeChat.msgs.length){
    S.activeChat.msgs=fresh;
    patchMsgList(fresh);
  }
}

function patchMsgList(msgs){
  const ml=document.getElementById('msgList');
  if(!ml){R();return}
  const set=gSet(S.me.id);
  ml.innerHTML=renderMsgs(msgs,set.fontSize||15,set.readReceipt!==false,S.activeChat)+'<div id="msgEnd"></div>';
  const mi=document.getElementById('msgIn');
  if(mi){mi.value='';_txt='';mi.focus({preventScroll:true})}
  updateSendBtn();
  const me=document.getElementById('msgEnd');
  if(me)me.scrollIntoView({behavior:'smooth'});
}

async function doSend(){
  const txt=_txt.trim();
  if(!txt||!S.activeChat)return;
  _txt='';
  const mi=document.getElementById('msgIn');
  if(mi){mi.value='';mi.focus({preventScroll:true})}
  updateSendBtn();
  const key=chatKey(S.me.id,S.activeChat.userId);
  const msg={from:S.me.id,text:txt,time:ts(),read:false,ts:Date.now()};
  // Push to Firebase — other device gets it via SSE/poll
  await fbPush(`messages/${key}`,msg);
  // Increment recipient's unread
  const curUnread=await fbGet(`unread/${S.activeChat.userId}/${S.me.id}`)||0;
  await fbSet(`unread/${S.activeChat.userId}/${S.me.id}`,curUnread+1);
  // Refresh local msgs
  const data=await fbGet(`messages/${key}`);
  if(data){
    S.activeChat.msgs=msgObjToArr(data);
    patchMsgList(S.activeChat.msgs);
  }
}

// ═══════════════ ACTIONS ═══════════════
async function openChat(uid){
  S.page='loading';R();setLoadMsg('대화 불러오는 중...');
  const u=await fbGet(`users/${uid}`);
  const ov=await fbGet(`profiles/${uid}`)||{};
  const photo=lGet(`photo_${uid}`);
  const f=u?{...u,...ov,id:uid,photo}:S.friends.find(f=>f.id===uid);
  if(!f){S.page='main';R();return}
  // Mark messages as read
  const key=chatKey(S.me.id,uid);
  const rawMsgs=await fbGet(`messages/${key}`)||{};
  const updates={};
  Object.entries(rawMsgs).forEach(([k,v])=>{if(v.from!==S.me.id&&!v.read)updates[k]={...v,read:true}});
  if(Object.keys(updates).length)await fbPatch(`messages/${key}`,updates);
  // Clear unread
  await fbSet(`unread/${S.me.id}/${uid}`,0);
  const msgs=msgObjToArr({...rawMsgs,...updates});
  _txt='';
  S.activeChat={userId:uid,name:f.name,color:f.color,photo:f.photo||null,msgs};
  S.friendProfId=null;
  S.page='chat';R();
}

async function saveStatus(){
  const st=S.tmpStatus;
  await fbPatch(`profiles/${S.me.id}`,{status:st});
  S.me={...S.me,status:st};S.editStatus=false;R();
}

function doLogout(){
  stopMsgStream();clearInterval(pollTimer);
  lSet('session',null);
  S.me=null;S.friends=[];S.prevs=[];S.activeChat=null;S.setPage=null;S.friendProfId=null;_txt='';
  S.page='login';R();
}

async function doSearch(){
  S.addRes=null;S.foundU=null;
  const q=S.addId.trim().toLowerCase();if(!q)return;
  const srchBtn=document.getElementById('doSrch');
  if(srchBtn){srchBtn.disabled=true;srchBtn.textContent='...';}
  if(q===S.me.id){S.addRes='self';R();return}
  const frIds=await fbGet(`friends/${S.me.id}`)||{};
  if(frIds[q]){S.addRes='already';const u=await fbGet(`users/${q}`);const ov=await fbGet(`profiles/${q}`)||{};S.foundU=u?{...u,...ov,id:q}:null;R();return}
  const u=await fbGet(`users/${q}`);
  if(u){const ov=await fbGet(`profiles/${q}`)||{};S.addRes='success';S.foundU={...u,...ov,id:q};}
  else S.addRes='notfound';
  R();
}

async function confirmAdd(){
  const f=S.foundU;if(!f)return;
  const btn=document.getElementById('confirmAdd');
  if(btn){btn.disabled=true;btn.textContent='추가 중...'}
  await fbSet(`friends/${S.me.id}/${f.id}`,true);
  await fbSet(`friends/${f.id}/${S.me.id}`,true);
  const key=chatKey(S.me.id,f.id);
  const existing=await fbGet(`messages/${key}`);
  if(!existing){
    await fbPush(`messages/${key}`,{from:f.id,text:'안녕하세요! 친구 추가해줘서 고마워요 😊',time:ts(),read:false,ts:Date.now()});
    await fbSet(`unread/${S.me.id}/${f.id}`,1);
  }
  S.friends=await loadFriends(S.me.id);
  S.prevs=await loadPrevs(S.me.id,S.friends);
  S.showAdd=false;S.addId='';S.addRes=null;S.foundU=null;R();
}

// ═══════════════ POLL (fallback) ═══════════════
function startPoll(){
  clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    if(!S.me)return;
    // Refresh unread counts in main
    if(S.page==='main'){
      const unread=await fbGet(`unread/${S.me.id}`)||{};
      let changed=false;
      S.prevs.forEach(p=>{const u=unread[p.userId]||0;if(p.unread!==u){p.unread=u;changed=true}});
      if(changed)R();
    }
  },5000);
}

// ═══════════════ PWA ═══════════════
if('serviceWorker'in navigator){
  const sw=`self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',()=>clients.claim());`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

// ═══════════════ BOOT ═══════════════
async function boot(){
  S.page='loading';R();
  setLoadMsg('서버 연결 중...');
  await initDB();
  setLoadMsg('준비 완료!');
  // Restore session
  const sess=lGet('session');
  if(sess&&sess.id){
    setLoadMsg('로그인 정보 확인 중...');
    const u=await fbGet(`users/${sess.id}`);
    if(u){
      const ov=await fbGet(`profiles/${sess.id}`)||{};
      const photo=lGet(`photo_${sess.id}`);
      S.me={...u,...ov,id:sess.id,photo};
      setLoadMsg('데이터 불러오는 중...');
      S.friends=await loadFriends(sess.id);
      S.prevs=await loadPrevs(sess.id,S.friends);
      S.tab='friends';S.page='main';_txt='';startPoll();R();return;
    }
  }
  S.page='login';R();
}
boot();
</script>
